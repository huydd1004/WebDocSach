<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thư Viện Truyện</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="title library-title">
    <img class="library-title-logo" src="images/logo.png" alt="Thư viện truyện logo">
    <span class="library-title-text">Thư viện truyện</span>
  </h1>

  <div class="genre-filters" id="genreFilters">
    <!-- checkboxes inserted by JS -->
  </div>

  <div class="search-bar">
    <input id="bookSearch" type="search" placeholder="Tìm truyện theo tên..." />
  </div>

  <div id="book-list" class="grid"></div>

  <script src="script.js"></script>
  <button id="scrollTopBtn" class="scroll-top" type="button" title="Lên đầu trang">&#11014;</button>
</body>
</html>
