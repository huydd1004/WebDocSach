<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đọc truyện</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-bar">
  <button class="home-logo-btn home-brand-btn" onclick="goHome()" aria-label="Trang chủ" title="Trang chủ">
    <img class="home-logo" src="images/logo.png" alt="Trang chủ">
    <span class="home-brand-text">Thư viện truyện</span>
  </button>
</div>

<div class="nav">
  <button onclick="firstChapter()">⏮</button>
  <button onclick="prevChapter()">◀</button>

  <select id="partSelect" onchange="changePart()"></select>
  <select id="chapterSelect" onchange="changeChapter()"></select>

  <button onclick="nextChapter()">▶</button>
  <button onclick="lastChapter()">⏭</button>

  <button onclick="toggleSettings()">⚙</button>
</div>

<div id="content" class="content"></div>



<div class="nav bottom">
  <button onclick="firstChapter()">⏮</button>
  <button onclick="prevChapter()">◀</button>

  <!-- SELECT CHỌN CHƯƠNG Ở GIỮA -->
  <select id="chapterSelectBottom" onchange="changeChapterBottom()"></select>

  <button onclick="nextChapter()">▶</button>
  <button onclick="lastChapter()">⏭</button>
</div>

<div id="settings" class="settings hidden">
  <button class="settings-close" onclick="toggleSettings()" aria-label="Đóng cài đặt">✖</button>
  <h3>Chọn giao diện đọc</h3>
  <div class="theme-btns">
    <button onclick="applyTheme(0)">🌙 Dark</button>
    <button onclick="applyTheme(1)">📖 Light</button>
    <button onclick="applyTheme(2)">💛 Sepia</button>
  </div>

  <h3>Chọn font chữ</h3>
  <div class="font-controls">
    <button onclick="setFont('Noto Sans')">Noto Sans</button>
    <button onclick="setFont('Merriweather')">Merriweather</button>
  </div>

  <h3>Chọn cỡ chữ</h3>
  <div class="fontsize-controls">
    <input id="fontSlider" type="range" min="14" max="30" step="1" value="20">
    <span id="fontSizeLabel">20px</span>
  </div>

  <h3>Khoảng cách dòng</h3>
  <div class="lineheight-controls">
    <button onclick="setLineHeight(1.5)">1.5</button>
    <button onclick="setLineHeight(2)">2.0</button>
    <button onclick="setLineHeight(2.5)">2.5</button>
  </div>

  <h3>Khoảng cách chữ</h3>
  <div class="letterspacing-controls">
    <button onclick="setLetterSpacing('normal')">Chuẩn</button>
    <button onclick="setLetterSpacing('0.06em')">Rộng</button>
    <button onclick="setLetterSpacing('0.12em')">Rộng hơn</button>
  </div>

  <h3>Đọc to (Text-to-Speech)</h3>
  <div class="tts-controls">
    <label for="voiceSelect">Giọng:</label>
    <select id="voiceSelect"></select>

    <label for="ttsRate">Tốc độ:</label>
    <input id="ttsRate" type="range" min="0.6" max="1.8" step="0.1" value="1">
    <span id="ttsRateVal">1.0x</span>

    <div class="tts-buttons">
      <button id="ttsPlayBtn" type="button">▶ Play</button>
      <button id="ttsPauseBtn" type="button">⏸ Pause</button>
      <button id="ttsStopBtn" type="button">⏹ Stop</button>
    </div>
  </div>
</div>



<script src="script.js"></script>
<!-- Scroll to top button -->
<button id="scrollTopBtn" class="scroll-top" title="Lên đầu trang">⬆</button>
</body>
</html>
